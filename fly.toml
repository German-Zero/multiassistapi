# fly.toml app configuration file generated for multiassistapi on 2026-03-11T04:31:27-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "multiassistapi"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    method = "get"
    path = "/api/health"

[[vm]]
  cpus = 1
  memory_mb = 1024
